<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Leitura Bíblica</title>
<style>
:root{
  --bg:#f8f7f4;--surface:#fff;--border:#e5e3dc;--text:#1a1a18;--muted:#888780;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-border:#bfdbfe;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fde68a;
  --purple:#7c3aed;--purple-bg:#f5f3ff;--purple-border:#ddd6fe;
  --radius:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#18181b;--surface:#27272a;--border:#3f3f46;--text:#fafafa;--muted:#a1a1aa;
  --accent:#60a5fa;--accent-bg:#1e3a5f;--accent-border:#1d4ed8;
  --green:#4ade80;--green-bg:#14532d;--green-border:#166534;
  --amber:#fbbf24;--amber-bg:#451a03;--amber-border:#92400e;
  --purple:#a78bfa;--purple-bg:#2e1065;--purple-border:#5b21b6;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Setup ── */
#setup{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center;gap:0}
#setup.visible{display:flex}
.setup-logo{font-size:48px;margin-bottom:20px}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:16px}
.setup-card h1{font-size:20px;font-weight:700;text-align:center}
.setup-card p{font-size:13px;color:var(--muted);line-height:1.6;text-align:center}
.field-label{font-size:12px;font-weight:600;color:var(--muted);text-align:left;text-transform:uppercase;letter-spacing:.05em}
.setup-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.setup-input:focus{border-color:var(--accent)}
.setup-input::placeholder{color:var(--muted)}
.setup-btn{width:100%;padding:15px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s}
.setup-btn:active{opacity:.85}
.setup-btn:disabled{opacity:.5;cursor:not-allowed}
.setup-divider{border:none;border-top:1px solid var(--border);margin:4px 0}
.setup-secondary{font-size:13px;color:var(--muted);text-align:center}
.setup-secondary a{color:var(--accent);text-decoration:none;font-weight:500}
.setup-error{font-size:13px;color:#dc2626;text-align:center;background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius);padding:10px;display:none}
.setup-error.visible{display:block}

/* ── Header ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:640px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
.header-left{display:flex;align-items:center;gap:10px;min-width:0}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-bg);border:1.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0}
.header h1{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:99px;padding:5px 12px;cursor:pointer;white-space:nowrap}
.icon-btn:active{background:var(--border)}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.prog-txt{font-size:12px;color:var(--muted);white-space:nowrap;min-width:80px;text-align:right}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;padding:14px 20px 0;max-width:640px;margin:0 auto;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab.done-tab{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}

/* ── Main ── */
.main{max-width:640px;margin:0 auto;padding:16px 20px 100px}

/* ── Today ── */
.today-card{background:var(--surface);border:1.5px solid var(--accent-border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.today-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:5px}
.today-title{font-size:17px;font-weight:700;margin-bottom:4px;line-height:1.3}
.today-sub{font-size:13px;color:var(--muted);margin-bottom:14px}
.readings{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.r-row{display:flex;align-items:center;gap:10px}
.r-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:99px;flex-shrink:0}
.b-at{background:#fef3c7;color:#78350f}
.b-nt{background:#e0e7ff;color:#3730a3}
.b-sl{background:#fce7f3;color:#831843}
@media(prefers-color-scheme:dark){
  .b-at{background:#451a03;color:#fbbf24}
  .b-nt{background:#1e1b4b;color:#a5b4fc}
  .b-sl{background:#500724;color:#f9a8d4}
}
.r-link{font-size:15px;font-weight:600;color:var(--accent);text-decoration:none}
.r-link:hover{text-decoration:underline}
.done-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.done-btn.pending{background:var(--accent);color:#fff}
.done-btn.pending:active{opacity:.85}
.done-btn.completed{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-border)}
.done-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Stats ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:22px;font-weight:700}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Alert ── */
.alert{border-radius:var(--radius);padding:12px 16px;font-size:13px;margin-bottom:12px;line-height:1.5}
.alert-warn{background:var(--amber-bg);border:1px solid var(--amber-border);color:var(--amber)}

/* ── Days ── */
.week-sec{margin-bottom:18px}
.week-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px;padding:0 2px}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s,opacity .15s;-webkit-user-select:none;user-select:none}
.day-card:active{opacity:.75}
.day-card.done{background:var(--green-bg);border-color:var(--green-border)}
.day-card.next-day{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.day-num{min-width:40px;text-align:center;flex-shrink:0}
.day-num-n{font-size:20px;font-weight:700;line-height:1}
.day-num-s{font-size:10px;color:var(--muted)}
.day-info{flex:1;min-width:0}
.day-wd{font-size:11px;color:var(--muted);margin-bottom:3px}
.day-refs{font-size:13px;font-weight:500;line-height:1.5;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-sl{font-size:11px;color:var(--muted);margin-top:2px}
.check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.day-card.done .check{background:var(--green);border-color:var(--green)}
.check svg{display:none;width:13px;height:13px;stroke:#fff;stroke-width:3;fill:none}
.day-card.done .check svg{display:block}

/* ── Ranking ── */
.ranking-section{margin-top:20px}
.ranking-title{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;padding:0 2px}
.ranking-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-pos{width:24px;font-size:14px;font-weight:700;color:var(--muted);text-align:center;flex-shrink:0}
.rank-pos.gold{color:#d97706}
.rank-pos.silver{color:#6b7280}
.rank-pos.bronze{color:#92400e}
.rank-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent);flex-shrink:0}
.rank-name{flex:1;font-size:14px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-name.me{color:var(--accent)}
.rank-pct{font-size:13px;font-weight:600;color:var(--green)}
.rank-bar-wrap{flex-shrink:0;width:60px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.rank-bar{height:100%;background:var(--green);border-radius:2px}

/* ── Status bar ── */
.status-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 20px calc(10px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px;flex-shrink:0}
.status-dot.offline{background:#f87171}
.status-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-left{display:flex;align-items:center}

/* ── Done banner ── */
.done-banner{background:var(--green-bg);border:1.5px solid var(--green-border);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:14px}
.done-banner h3{font-size:18px;font-weight:700;color:var(--green)}
.done-banner p{font-size:13px;color:var(--muted);margin-top:6px}

#app{display:none}
#app.visible{display:block}
</style>
</head>
<body>

<!-- ── Tela de entrada ── -->
<div id="setup" class="visible">
  <div class="setup-logo">✝</div>
  <div class="setup-card">
    <h1>Plano de Leitura<br>Bíblica — 6 Meses</h1>
    <p>Digite seu nome para acompanhar seu progresso. Cada pessoa tem seu próprio registro.</p>
    <hr class="setup-divider">

    <div>
      <div class="field-label" style="margin-bottom:6px">Seu nome</div>
      <input class="setup-input" id="input-nome" type="text" placeholder="Ex: Bruno" maxlength="30" autocomplete="off" spellcheck="false">
    </div>

    <div id="setup-error" class="setup-error">Por favor, preencha os dois campos.</div>

    <div style="display:none" id="url-field">
      <div class="field-label" style="margin-bottom:6px">URL do Apps Script</div>
      <input class="setup-input" id="input-url" type="url" placeholder="https://script.google.com/macros/s/..." autocomplete="off" spellcheck="false">
    </div>

    <button class="setup-btn" id="btn-entrar" onclick="entrar()">Entrar</button>

    <p class="setup-secondary">Primeira vez? <a href="#" onclick="toggleUrlField()">Configurar servidor</a></p>
  </div>
</div>

<!-- ── App principal ── -->
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="header-left">
          <div class="user-avatar" id="user-avatar">?</div>
          <h1 id="header-title">Leitura Bíblica</h1>
        </div>
        <div class="header-actions">
          <button class="icon-btn" onclick="sincronizar(true)">↻ Sync</button>
          <button class="icon-btn" onclick="sair()">Sair</button>
        </div>
      </div>
      <div class="prog-row">
        <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <span class="prog-txt" id="prog-txt">0 / 144</span>
      </div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="main">
    <div id="alert-area"></div>
    <div class="stats-row" id="stats-row"></div>
    <div id="today-sec"></div>
    <div id="days-list"></div>
    <div id="ranking-sec"></div>
  </div>

  <div class="status-bar">
    <span class="status-left"><span class="status-dot" id="status-dot"></span><span id="status-txt">Conectado</span></span>
    <span id="status-user" style="color:var(--muted)"></span>
  </div>
</div>

// ── Setup ──
function toggleUrlField() {
  urlFieldVisible = !urlFieldVisible;
  document.getElementById('url-field').style.display = urlFieldVisible ? 'block' : 'none';
  event.preventDefault();
}

function init() {
  scriptUrl = localStorage.getItem(LS_URL) || '';
  nome      = localStorage.getItem(LS_NOME) || '';

  if (nome && scriptUrl) {
    mostrarApp();
  } else if (nome && !scriptUrl) {
    // Tem nome mas não tem URL — pedir URL
    document.getElementById('input-nome').value = nome;
    urlFieldVisible = true;
    document.getElementById('url-field').style.display = 'block';
    mostrarSetup();
  } else {
    mostrarSetup();
  }
}

function mostrarSetup() {
  document.getElementById('setup').classList.add('visible');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
}

function mostrarApp() {
  document.getElementById('setup').classList.remove('visible');
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').classList.add('visible');

  // Carregar cache
  const cached = localStorage.getItem(LS_CACHE + nome);
  if (cached) try { progress = JSON.parse(cached); } catch(e) {}
  currentMes = parseInt(localStorage.getItem(LS_MES + nome) || '1');

  // Avatar e header
  const inicial = nome.charAt(0).toUpperCase();
  document.getElementById('user-avatar').textContent = inicial;
  document.getElementById('header-title').textContent = nome + ' — 6 Meses';
  document.getElementById('status-user').textContent = nome;

  render();
  sincronizar(false);
}

function entrar() {
  const n   = document.getElementById('input-nome').value.trim();
  const url = document.getElementById('input-url').value.trim();
  const err = document.getElementById('setup-error');

  if (!n) { err.textContent = 'Digite seu nome.'; err.classList.add('visible'); return; }
  if (n.length < 2) { err.textContent = 'Nome muito curto.'; err.classList.add('visible'); return; }

  // Se URL field está visível, validar e salvar
  if (urlFieldVisible) {
    if (!url || !url.startsWith('https://script.google.com/macros/s/')) {
      err.textContent = 'URL inválida. Deve começar com https://script.google.com/macros/s/';
      err.classList.add('visible');
      return;
    }
    scriptUrl = url;
    localStorage.setItem(LS_URL, url);
  }

  if (!scriptUrl) {
    err.textContent = 'Configure o servidor primeiro. Clique em "Configurar servidor".';
    err.classList.add('visible');
    return;
  }

  err.classList.remove('visible');
  nome = n;
  localStorage.setItem(LS_NOME, nome);
  mostrarApp();
}

function sair() {
  // Salva progresso cache mas limpa nome ativo
  // (URL permanece — próxima pessoa só precisa digitar o nome)
  localStorage.removeItem(LS_NOME);
  nome = '';
  progress = {};
  document.getElementById('input-nome').value = '';
  mostrarSetup();
}

// ── Sync ──
async function sincronizar(manual) {
  if (syncing) return;
  syncing = true;
  setStatus('syncing');

  try {
    const res = await fetch(
      scriptUrl + '?action=get&nome=' + encodeURIComponent(nome),
      { cache: 'no-store' }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    progress = data.progress || {};
    localStorage.setItem(LS_CACHE + nome, JSON.stringify(progress));
    setStatus('ok');
    clearAlert();
    if (manual) carregarRanking();
  } catch(e) {
    setStatus('offline');
    showAlert('Sem conexão com o servidor. Progresso exibido do cache local.');
  } finally {
    syncing = false;
    render();
  }
}

async function toggleDay(dia) {
  const key    = String(dia);
  const wasDone = progress[key] && progress[key].done;

  // Optimistic update
  progress[key] = { done: !wasDone, date: wasDone ? '' : new Date().toISOString() };
  localStorage.setItem(LS_CACHE + nome, JSON.stringify(progress));
  render();

  try {
    const res = await fetch(
      scriptUrl + '?action=toggle&nome=' + encodeURIComponent(nome) + '&dia=' + dia,
      { cache: 'no-store' }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    progress[key] = { done: data.done, date: data.date };
    localStorage.setItem(LS_CACHE + nome, JSON.stringify(progress));
    setStatus('ok');
    clearAlert();
  } catch(e) {
    setStatus('offline');
    showAlert('Alteração salva localmente. Toque em Sync quando tiver conexão.');
  }
  render();
}

async function carregarRanking() {
  try {
    const res  = await fetch(scriptUrl + '?action=listar_usuarios', { cache: 'no-store' });
    const data = await res.json();
    if (!data.usuarios || data.usuarios.length < 2) {
      document.getElementById('ranking-sec').innerHTML = '';
      return;
    }
    // Buscar info de cada usuário
    const infos = await Promise.all(
      data.usuarios.map(u =>
        fetch(scriptUrl + '?action=info&nome=' + encodeURIComponent(u.nome))
          .then(r => r.json()).catch(() => null)
      )
    );
    const validos = infos.filter(Boolean).sort((a,b) => b.dias_concluidos - a.dias_concluidos);
    renderRanking(validos);
  } catch(e) {
    // silencioso
  }
}

function renderRanking(lista) {
  if (!lista || lista.length < 2) {
    document.getElementById('ranking-sec').innerHTML = '';
    return;
  }
  const medalhas = ['gold','silver','bronze'];
  const emojis   = ['1°','2°','3°'];
  let rows = '';
  lista.forEach((u, i) => {
    const isMe  = u.nome.toLowerCase() === nome.toLowerCase();
    const pct   = u.percentual || 0;
    const mClass = i < 3 ? medalhas[i] : '';
    const posLabel = i < 3 ? emojis[i] : (i+1)+'°';
    const inicial  = u.nome.charAt(0).toUpperCase();
    rows += `
      <div class="rank-row">
        <div class="rank-pos ${mClass}">${posLabel}</div>
        <div class="rank-avatar">${inicial}</div>
        <div class="rank-name ${isMe?'me':''}">${u.nome}${isMe?' (você)':''}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
        <div class="rank-pct">${pct}%</div>
      </div>`;
  });
  document.getElementById('ranking-sec').innerHTML = `
    <div class="ranking-section">
      <div class="ranking-title">Progresso do grupo</div>
      <div class="ranking-card">${rows}</div>
    </div>`;
}

// ── Utils ──
function isDone(dia) {
  const d = progress[String(dia)];
  return d && (d.done === true || d.done === 'TRUE');
}
function findNext() {
  for (const d of PLANO) if (!isDone(d.dia)) return d;
  return null;
}
function setStatus(s) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-txt');
  if (s==='ok')      { dot.className='status-dot'; txt.textContent='Sincronizado'; }
  if (s==='offline') { dot.className='status-dot offline'; txt.textContent='Offline (cache)'; }
  if (s==='syncing') { dot.className='status-dot syncing'; txt.textContent='Sincronizando…'; }
}
function showAlert(msg) {
  document.getElementById('alert-area').innerHTML =
    `<div class="alert alert-warn">${msg}</div>`;
}
function clearAlert() { document.getElementById('alert-area').innerHTML = ''; }

// ── Render ──
function getStats() {
  const done    = PLANO.filter(d=>isDone(d.dia)).length;
  const total   = PLANO.length;
  const pct     = Math.round(done/total*100);
  const diasMes = PLANO.filter(d=>d.mes===currentMes);
  const doneMes = diasMes.filter(d=>isDone(d.dia)).length;
  return {done,total,pct,doneMes,totalMes:diasMes.length};
}

function renderHeader() {
  const st = getStats();
  document.getElementById('prog-fill').style.width = st.pct+'%';
  document.getElementById('prog-txt').textContent  = `${st.done} / ${st.total}`;
}

function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  for (let m=1; m<=6; m++) {
    const dias  = PLANO.filter(d=>d.mes===m);
    const done  = dias.filter(d=>isDone(d.dia)).length;
    const allOk = done===dias.length;
    const btn   = document.createElement('button');
    btn.className = 'tab'+(m===currentMes?' active':'')+(allOk?' done-tab':'');
    btn.textContent = allOk ? `Mês ${m} ✓` : `Mês ${m}`;
    btn.onclick = () => {
      currentMes = m;
      localStorage.setItem(LS_MES+nome, m);
      render();
    };
    el.appendChild(btn);
  }
}

function renderStats() {
  const st = getStats();
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-n">${st.done}</div><div class="stat-l">dias lidos</div></div>
    <div class="stat"><div class="stat-n">${st.pct}%</div><div class="stat-l">concluído</div></div>
    <div class="stat"><div class="stat-n">${st.doneMes}/${st.totalMes}</div><div class="stat-l">neste mês</div></div>`;
}

function renderToday() {
  const next = findNext();
  const sec  = document.getElementById('today-sec');
  if (!next) {
    sec.innerHTML = `<div class="done-banner"><h3>Parabéns, ${nome}! Bíblia completa! 🎉</h3><p>Do Gênesis ao Apocalipse — toda a Palavra lida.</p></div>`;
    return;
  }
  const done = isDone(next.dia);
  const atH  = next.at.map(r=>`<div class="r-row"><span class="r-badge b-at">AT</span><a class="r-link" href="${r.url}" target="_blank" rel="noopener">${r.ref}</a></div>`).join('');
  const ntH  = next.nt.map(r=>`<div class="r-row"><span class="r-badge b-nt">NT</span><a class="r-link" href="${r.url}" target="_blank" rel="noopener">${r.ref}</a></div>`).join('');
  const slH  = next.salmo ? `<div class="r-row"><span class="r-badge b-sl">Sl</span><a class="r-link" href="${next.salmo_url}" target="_blank" rel="noopener">Salmo ${next.salmo}</a></div>` : '';
  sec.innerHTML = `
    <div class="today-card">
      <div class="today-label">Próxima leitura · Dia ${next.dia} de 144</div>
      <div class="today-title">${next.dia_semana} — Semana ${next.semana}, Mês ${next.mes}</div>
      <div class="today-sub">${next.mes_nome}</div>
      <div class="readings">${atH}${ntH}${slH}</div>
      <button class="done-btn ${done?'completed':'pending'}" onclick="toggleDay(${next.dia})">
        ${done ? '✓ Lido — toque para desfazer' : 'Marcar como lido'}
      </button>
    </div>`;
}

function renderDays() {
  const dias  = PLANO.filter(d=>d.mes===currentMes);
  const next  = findNext();
  const nextN = next ? next.dia : null;
  const semanas = {};
  for (const d of dias) {
    if (!semanas[d.semana]) semanas[d.semana]=[];
    semanas[d.semana].push(d);
  }
  let html = '';
  for (const [sem, ds] of Object.entries(semanas)) {
    const doneSem = ds.filter(d=>isDone(d.dia)).length;
    html += `<div class="week-sec"><div class="week-lbl">Semana ${sem} · ${doneSem}/${ds.length}</div>`;
    for (const d of ds) {
      const done = isDone(d.dia);
      const isNxt = d.dia===nextN;
      const atR  = d.at.map(r=>r.ref).join(' · ');
      const ntR  = d.nt.map(r=>r.ref).join(' · ');
      html += `
        <div class="day-card${done?' done':''}${isNxt?' next-day':''}" onclick="toggleDay(${d.dia})">
          <div class="day-num"><div class="day-num-n">${d.dia}</div><div class="day-num-s">dia</div></div>
          <div class="day-info">
            <div class="day-wd">${d.dia_semana}${isNxt?' · <strong>próxima</strong>':''}</div>
            <div class="day-refs">${atR} · ${ntR}</div>
            ${d.salmo?`<div class="day-sl">Salmo ${d.salmo}</div>`:''}
          </div>
          <div class="check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></div>
        </div>`;
    }
    html += '</div>';
  }
  document.getElementById('days-list').innerHTML = html;
}

function render() {
  renderHeader();
  renderTabs();
  renderStats();
  renderToday();
  renderDays();
}

init();
</script>

</html>
